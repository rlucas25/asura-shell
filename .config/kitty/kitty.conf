font_family JetBrainsMono NF
font_size 10.5

cursor_shape block
cursor_stop_blinking_after 0
scrollback_lines 2000
copy_on_select yes
mouse_hide_wait 0
select_by_word_characters @-./_~?&=%+#a
enable_audio_bell no
bell_on_tab "🔔 "
remember_window_size  no
window_border_width 1pt
draw_minimal_borders yes
window_padding_width 10
inactive_text_alpha 0.6
hide_window_decorations yes
confirm_os_window_close 0
tab_bar_style powerline

# Resizing windows
map ctrl+left resize_window narrower
map ctrl+right resize_window wider
map ctrl+up resize_window taller
map ctrl+down resize_window shorter
map ctrl+home resize_window reset

# Enable splits layout
enabled_layouts splits,stack

# Allow felix to open files in new panes
allow_remote_control yes
listen_on unix:/tmp/kitty

# Shell
shell fish

# Open new panes side-by-side (vertical split line)
map ctrl+shift+enter launch --location=vsplit --cwd=current
map ctrl+shift+\ launch --location=hsplit --cwd=current

# Session management
map ctrl+shift+s save_as_session --use-foreground-process --relocatable
map ctrl+shift+a goto_session ~/.config/kitty/sessions

# BEGIN_KITTY_THEME
# Noctalia
include current-theme.conf
# END_KITTY_THEME
